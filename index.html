<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Biz Hub – Pricing & Availability</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Roboto',sans-serif;background:#f4f4f4;color:#0D0D0D;padding:24px 16px 48px}

/* ── Header ── */
.header{text-align:center;margin-bottom:28px}
.header h1{font-family:Arial,sans-serif;font-size:2rem;font-weight:700;color:#AF2849}
.header p{font-size:.95rem;color:#686E6E;margin-top:6px}

/* ── Tabs ── */
.tabs{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:24px}
.tab{font-family:Arial,sans-serif;font-size:.85rem;font-weight:700;padding:8px 22px;
  border-radius:999px;border:2px solid #AF2849;background:transparent;color:#AF2849;
  cursor:pointer;transition:all .2s}
.tab:hover,.tab.active{background:#AF2849;color:#fff}

/* ── Floor plan wrapper ── */
.floor-section{display:none;margin-bottom:36px}
.floor-section.visible{display:block}
.floor-label{font-family:Arial,sans-serif;font-size:1rem;font-weight:700;color:#fff;
  background:#0D0D0D;padding:7px 18px;border-radius:6px;display:inline-block;margin-bottom:14px}

/* ── Interactive map ── */
.map-wrap{position:relative;width:100%;max-width:900px;margin:0 auto 28px}
.map-wrap img{width:100%;height:auto;display:block;border-radius:8px;
  box-shadow:0 4px 16px rgba(0,0,0,.12)}
.hotspot{position:absolute;border-radius:4px;cursor:pointer;transition:all .18s;
  border:2px solid transparent}
.hotspot.available{background:rgba(175,40,73,.18);border-color:#AF2849}
.hotspot.unavailable{background:rgba(104,110,110,.15);border-color:#686E6E}
.hotspot:hover{transform:scale(1.05);z-index:10}
.hotspot.available:hover{background:rgba(175,40,73,.38)}
.hotspot.unavailable:hover{background:rgba(104,110,110,.3)}
.hotspot-label{position:absolute;bottom:3px;left:50%;transform:translateX(-50%);
  font-family:Arial,sans-serif;font-size:.6rem;font-weight:700;
  color:#fff;white-space:nowrap;text-shadow:0 1px 3px rgba(0,0,0,.7);pointer-events:none}

/* ── Popup ── */
.popup-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;
  align-items:center;justify-content:center}
.popup-overlay.show{display:flex}
.popup{background:#fff;border-radius:14px;padding:28px 28px 24px;max-width:380px;width:90%;
  position:relative;box-shadow:0 12px 40px rgba(0,0,0,.2)}
.popup::before{content:'';display:block;height:5px;background:#AF2849;
  border-radius:999px;margin-bottom:18px}
.popup-close{position:absolute;top:14px;right:16px;font-size:1.4rem;cursor:pointer;
  color:#686E6E;line-height:1}
.popup-close:hover{color:#AF2849}
.popup-unit{font-family:Arial,sans-serif;font-size:1.2rem;font-weight:700;margin-bottom:6px}
.popup-badge{display:inline-block;font-size:.72rem;font-weight:700;padding:3px 11px;
  border-radius:999px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.badge-avail{background:#e8f5e9;color:#2e7d32}
.badge-unavail{background:#f0f0f0;color:#686E6E}
.popup-details{font-size:.88rem;color:#686E6E;line-height:1.85}
.popup-details span{color:#0D0D0D;font-weight:500}
.popup-price{font-family:Arial,sans-serif;font-size:1.6rem;font-weight:700;
  color:#AF2849;margin-top:14px}
.popup-price small{font-size:.8rem;font-weight:400;color:#686E6E}
.popup-price-na{font-size:.9rem;color:#686E6E;margin-top:14px;font-style:italic}

/* ── Unit grid (fallback / non-floor-plan floors) ── */
.units-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;
  max-width:900px;margin:0 auto}
.unit-card{background:#fff;border-radius:10px;padding:16px 18px;border:1.5px solid #e0e0e0;
  position:relative;overflow:hidden;transition:transform .15s,box-shadow .15s}
.unit-card:hover{transform:translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.09)}
.unit-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:#AF2849}
.unit-card.na::before{background:#686E6E}
.card-name{font-family:Arial,sans-serif;font-size:.95rem;font-weight:700;margin-bottom:8px}
.card-badge{display:inline-block;font-size:.7rem;font-weight:700;padding:2px 9px;
  border-radius:999px;text-transform:uppercase;margin-bottom:10px}
.card-details{font-size:.82rem;color:#686E6E;line-height:1.7}
.card-price{font-family:Arial,sans-serif;font-size:1.25rem;font-weight:700;
  color:#AF2849;margin-top:10px}
.card-price small{font-size:.75rem;font-weight:400;color:#686E6E}
.card-price-na{font-size:.85rem;color:#686E6E;margin-top:10px;font-style:italic}

/* ── Add-ons ── */
.addons{background:#fff;border-radius:10px;padding:22px 26px;border:1.5px solid #e0e0e0;
  max-width:440px;margin:32px auto 0}
.addons h2{font-family:Arial,sans-serif;font-size:1rem;font-weight:700;
  border-bottom:2px solid #FEB35D;padding-bottom:8px;margin-bottom:12px}
.addon-row{display:flex;justify-content:space-between;padding:7px 0;
  border-bottom:1px solid #f0f0f0;font-size:.88rem}
.addon-row:last-child{border-bottom:none}
.addon-price{font-weight:600;color:#AF2849}

.last-updated{text-align:center;font-size:.75rem;color:#bbb;margin-top:24px}

@media(max-width:520px){
  .header h1{font-size:1.5rem}
  .hotspot-label{font-size:.5rem}
}
</style>
</head>
<body>

<div class="header">
  <h1>Pricing &amp; Availability</h1>
  <p>901 S 15th St. &mdash; Biz Hub</p>
</div>

<div class="tabs">
  <button class="tab active" onclick="showFloor('1',this)">Floor 1</button>
  <button class="tab" onclick="showFloor('2',this)">Floor 2</button>
  <button class="tab" onclick="showFloor('3',this)">Floor 3</button>
  <button class="tab" onclick="showFloor('4',this)">Floor 4</button>
  <button class="tab" onclick="showFloor('Lot',this)">Lot</button>
</div>

<div id="floor-1" class="floor-section visible">
  <div class="floor-label">Floor 1</div>
  <div class="map-wrap" id="map-1">
    <img src="floor1.jpg" alt="Floor 1 Plan" id="img-1" onload="drawHotspots('1')"/>
  </div>
</div>

<div id="floor-2" class="floor-section">
  <div class="floor-label">Floor 2</div>
  <div class="units-grid" id="grid-2"></div>
</div>

<div id="floor-3" class="floor-section">
  <div class="floor-label">Floor 3</div>
  <div class="map-wrap" id="map-3">
    <img src="floor3.jpg" alt="Floor 3 Plan" id="img-3" onload="drawHotspots('3')"/>
  </div>
</div>

<div id="floor-4" class="floor-section">
  <div class="floor-label">Floor 4</div>
  <div class="units-grid" id="grid-4"></div>
</div>

<div id="floor-Lot" class="floor-section">
  <div class="floor-label">Outdoor / Lot</div>
  <div class="units-grid" id="grid-Lot"></div>
</div>

<div class="addons">
  <h2>Optional Add-Ons</h2>
  <div id="addons-list"></div>
</div>

<div class="last-updated" id="last-updated"></div>

<!-- Popup -->
<div class="popup-overlay" id="popup-overlay" onclick="closePopup(event)">
  <div class="popup" id="popup">
    <span class="popup-close" onclick="closePopupDirect()">&times;</span>
    <div class="popup-unit" id="p-unit"></div>
    <span class="popup-badge" id="p-badge"></span>
    <div class="popup-details" id="p-details"></div>
    <div id="p-price"></div>
  </div>
</div>

<script>
// ── Hotspot definitions (% of image dimensions) ──
// These were mapped from the actual floor plan images
const HOTSPOTS = {
  '1': [
    {unit:'Unit 100', x:3.5,  y:7,   w:11, h:24},
    {unit:'Unit 105', x:15.5, y:7,   w:11, h:24},
    {unit:'Unit 110', x:27.5, y:7,   w:11, h:24},
    {unit:'Unit 115', x:39.5, y:7,   w:11, h:24},
    {unit:'Unit 120', x:51.5, y:7,   w:11, h:24},
    {unit:'Unit 125', x:3.5,  y:35,  w:11, h:24},
    {unit:'Unit 130', x:15.5, y:35,  w:11, h:24},
    {unit:'Unit 135', x:27.5, y:35,  w:11, h:24},
    {unit:'Unit 140', x:39.5, y:35,  w:11, h:24},
    {unit:'Unit 142', x:51.5, y:35,  w:11, h:24},
    {unit:'Unit 145', x:3.5,  y:63,  w:11, h:24},
    {unit:'Unit 150', x:15.5, y:63,  w:11, h:24},
    {unit:'Unit 155', x:27.5, y:63,  w:11, h:24},
    {unit:'Unit 160', x:39.5, y:63,  w:11, h:24},
    {unit:'Unit 165', x:51.5, y:63,  w:11, h:24},
  ],
  '3': [
    {unit:'Unit 305',   x:2,   y:5,  w:13, h:28},
    {unit:'Unit 310',   x:16,  y:5,  w:9,  h:28},
    {unit:'Unit 315',   x:26,  y:5,  w:9,  h:28},
    {unit:'Unit 320',   x:36,  y:5,  w:10, h:28},
    {unit:'Unit 325',   x:47,  y:5,  w:10, h:28},
    {unit:'Unit 326',   x:58,  y:5,  w:7,  h:28},
    {unit:'Unit 327',   x:66,  y:5,  w:7,  h:28},
    {unit:'Unit 330 W', x:74,  y:5,  w:11, h:28},
    {unit:'Unit 335',   x:2,   y:38, w:12, h:26},
    {unit:'Unit 340',   x:15,  y:38, w:12, h:26},
    {unit:'Unit 345',   x:28,  y:38, w:13, h:26},
    {unit:'Unit 350 W', x:42,  y:38, w:13, h:26},
    {unit:'Unit 355 W', x:56,  y:38, w:9,  h:26},
    {unit:'Unit 360 W', x:66,  y:38, w:8,  h:26},
    {unit:'Unit 365 W', x:75,  y:38, w:8,  h:26},
    {unit:'Unit 370',   x:2,   y:68, w:24, h:27},
    {unit:'Unit 375 W', x:27,  y:68, w:12, h:27},
    {unit:'Unit 380 W', x:40,  y:68, w:20, h:27},
  ]
};

let pricingData = null;

async function init() {
  const res = await fetch('pricing.json?v=' + Date.now());
  pricingData = await res.json();
  drawHotspots('1');
  renderGrid('2');
  renderGrid('4');
  renderGrid('Lot');
  renderAddons();
  document.getElementById('last-updated').textContent = 'Last updated: ' + pricingData.last_updated;
  notifyHeight();
}

function getUnit(unitName) {
  for (const units of Object.values(pricingData.floors)) {
    const found = units.find(u => u.unit === unitName);
    if (found) return found;
  }
  return null;
}

function drawHotspots(floor) {
  if (!pricingData) return;
  const mapEl = document.getElementById('map-' + floor);
  const imgEl = document.getElementById('img-' + floor);
  if (!mapEl || !imgEl) return;

  // Remove existing hotspots
  mapEl.querySelectorAll('.hotspot').forEach(h => h.remove());

  const spots = HOTSPOTS[floor] || [];
  spots.forEach(spot => {
    const unit = getUnit(spot.unit);
    const isAvail = unit && unit.status === 'Available';

    const el = document.createElement('div');
    el.className = 'hotspot ' + (isAvail ? 'available' : 'unavailable');
    el.style.left   = spot.x + '%';
    el.style.top    = spot.y + '%';
    el.style.width  = spot.w + '%';
    el.style.height = spot.h + '%';
    el.title = spot.unit;

    const lbl = document.createElement('div');
    lbl.className = 'hotspot-label';
    lbl.textContent = spot.unit.replace('Unit ', '');
    el.appendChild(lbl);

    el.addEventListener('click', () => openPopup(spot.unit));
    mapEl.appendChild(el);
  });
}

function openPopup(unitName) {
  const unit = getUnit(unitName);
  if (!unit) return;

  document.getElementById('p-unit').textContent = unit.unit;

  const badge = document.getElementById('p-badge');
  badge.textContent = unit.status;
  badge.className = 'popup-badge ' + (unit.status === 'Available' ? 'badge-avail' : 'badge-unavail');

  let details = '';
  if (unit.sq_ft) details += '<div>&#128208; <span>' + unit.sq_ft.toLocaleString() + ' sq ft</span></div>';
  if (unit.per_sq_ft) details += '<div>&#128178; <span>$' + unit.per_sq_ft + ' / sq ft / yr</span></div>';
  if (unit.fobs > 0) details += '<div>&#128273; <span>' + unit.fobs + ' FOB(s) included</span></div>';
  if (unit.mailbox > 0) details += '<div>&#128140; <span>Mailbox included</span></div>';
  if (unit.desks > 0) details += '<div>&#128187; <span>' + unit.desks + ' desk(s) included</span></div>';
  document.getElementById('p-details').innerHTML = details;

  const priceEl = document.getElementById('p-price');
  if (unit.total_monthly) {
    priceEl.innerHTML = '<div class="popup-price">$' + unit.total_monthly.toLocaleString() + '<small> / mo</small></div>';
  } else {
    priceEl.innerHTML = '<div class="popup-price-na">Pricing on request</div>';
  }

  document.getElementById('popup-overlay').classList.add('show');
}

function closePopup(e) {
  if (e.target === document.getElementById('popup-overlay')) closePopupDirect();
}
function closePopupDirect() {
  document.getElementById('popup-overlay').classList.remove('show');
}

function renderGrid(floor) {
  if (!pricingData) return;
  const el = document.getElementById('grid-' + floor);
  if (!el) return;
  const units = pricingData.floors[floor] || [];
  el.innerHTML = units.map(u => {
    const isAvail = u.status === 'Available';
    const price = u.total_monthly
      ? '<div class="card-price">$' + u.total_monthly.toLocaleString() + '<small> / mo</small></div>'
      : '<div class="card-price-na">Pricing on request</div>';
    const badgeCls = isAvail ? 'badge-avail' : 'badge-unavail';
    return '<div class="unit-card ' + (isAvail ? '' : 'na') + '">' +
      '<div class="card-name">' + u.unit + '</div>' +
      '<span class="card-badge ' + badgeCls + '">' + u.status + '</span>' +
      '<div class="card-details">' +
        (u.sq_ft ? '<div>&#128208; ' + u.sq_ft.toLocaleString() + ' sq ft</div>' : '') +
        (u.per_sq_ft ? '<div>&#128178; $' + u.per_sq_ft + '/sq ft/yr</div>' : '') +
      '</div>' + price + '</div>';
  }).join('');
}

function renderAddons() {
  const el = document.getElementById('addons-list');
  el.innerHTML = pricingData.addons.map(a =>
    '<div class="addon-row"><span>' + a.name + '</span><span class="addon-price">$' + a.monthly + '/mo</span></div>'
  ).join('');
}

function showFloor(floor, btn) {
  document.querySelectorAll('.floor-section').forEach(s => s.classList.remove('visible'));
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.getElementById('floor-' + floor).classList.add('visible');
  btn.classList.add('active');
  if (HOTSPOTS[floor]) drawHotspots(floor);
  notifyHeight();
}

function notifyHeight() {
  setTimeout(() => {
    window.parent.postMessage({type:'bakery-height', height: document.body.scrollHeight}, '*');
  }, 100);
}

init();
</script>
</body>
</html>
