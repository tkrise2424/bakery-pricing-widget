<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Biz Hub Pricing & Availability</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Roboto', sans-serif;
    background: #f5f5f5;
    color: #0D0D0D;
    padding: 24px 16px 48px;
  }

  .widget-header {
    text-align: center;
    margin-bottom: 32px;
  }

  .widget-header h1 {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 2rem;
    font-weight: 700;
    color: #AF2849;
    letter-spacing: -0.5px;
  }

  .widget-header p {
    font-size: 0.95rem;
    color: #686E6E;
    margin-top: 6px;
  }

  .filter-bar {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    margin-bottom: 28px;
  }

  .filter-btn {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 8px 20px;
    border-radius: 999px;
    border: 2px solid #AF2849;
    background: transparent;
    color: #AF2849;
    cursor: pointer;
    transition: all 0.2s;
  }

  .filter-btn:hover, .filter-btn.active {
    background: #AF2849;
    color: #fff;
  }

  .floor-section {
    margin-bottom: 36px;
  }

  .floor-label {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: #fff;
    background: #0D0D0D;
    padding: 8px 20px;
    border-radius: 6px;
    display: inline-block;
    margin-bottom: 14px;
  }

  .units-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 14px;
  }

  .unit-card {
    background: #fff;
    border-radius: 10px;
    padding: 18px 20px;
    border: 1.5px solid #e0e0e0;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
    overflow: hidden;
  }

  .unit-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.09);
  }

  .unit-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 4px;
    background: #AF2849;
  }

  .unit-card.not-available::before {
    background: #686E6E;
  }

  .unit-name {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: #0D0D0D;
    margin-bottom: 10px;
  }

  .unit-badge {
    display: inline-block;
    font-size: 0.72rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 999px;
    margin-bottom: 12px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  .badge-available {
    background: #e8f5e9;
    color: #2e7d32;
  }

  .badge-unavailable {
    background: #f0f0f0;
    color: #686E6E;
  }

  .unit-details {
    font-size: 0.85rem;
    color: #686E6E;
    line-height: 1.7;
  }

  .unit-price {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 1.4rem;
    font-weight: 700;
    color: #AF2849;
    margin-top: 12px;
  }

  .unit-price span {
    font-size: 0.8rem;
    font-weight: 400;
    color: #686E6E;
  }

  .unit-price-na {
    font-size: 0.9rem;
    color: #686E6E;
    margin-top: 12px;
    font-style: italic;
  }

  .addons-section {
    margin-top: 40px;
    background: #fff;
    border-radius: 10px;
    padding: 24px 28px;
    border: 1.5px solid #e0e0e0;
    max-width: 480px;
  }

  .addons-section h2 {
    font-family: Arial, Helvetica, sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: #0D0D0D;
    margin-bottom: 14px;
    border-bottom: 2px solid #FEB35D;
    padding-bottom: 8px;
  }

  .addon-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid #f0f0f0;
    font-size: 0.9rem;
  }

  .addon-row:last-child { border-bottom: none; }
  .addon-name { color: #0D0D0D; }
  .addon-price { font-weight: 600; color: #AF2849; }

  .last-updated {
    text-align: center;
    font-size: 0.78rem;
    color: #aaa;
    margin-top: 32px;
  }

  @media (max-width: 480px) {
    .widget-header h1 { font-size: 1.5rem; }
    .units-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="widget-header">
  <h1>Pricing &amp; Availability</h1>
  <p>901 S 15th St. &mdash; Biz Hub</p>
</div>

<div class="filter-bar">
  <button class="filter-btn active" onclick="filterFloor('all', this)">All Floors</button>
  <button class="filter-btn" onclick="filterFloor('1', this)">Floor 1</button>
  <button class="filter-btn" onclick="filterFloor('2', this)">Floor 2</button>
  <button class="filter-btn" onclick="filterFloor('3', this)">Floor 3</button>
  <button class="filter-btn" onclick="filterFloor('4', this)">Floor 4</button>
  <button class="filter-btn" onclick="filterFloor('Lot', this)">Lot</button>
  <button class="filter-btn" onclick="filterAvailable(this)">Available Only</button>
</div>

<div id="floors-container"></div>

<div class="addons-section">
  <h2>Optional Add-Ons</h2>
  <div id="addons-container"></div>
</div>

<div class="last-updated" id="last-updated"></div>

<script>
const DATA_URL = 'pricing.json';
let pricingData = null;
let currentFloor = 'all';
let availableOnly = false;

async function loadData() {
  const res = await fetch(DATA_URL + '?v=' + Date.now());
  pricingData = await res.json();
  render();
}

function filterFloor(floor, btn) {
  currentFloor = floor;
  availableOnly = false;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function filterAvailable(btn) {
  availableOnly = !availableOnly;
  currentFloor = 'all';
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.toggle('active', availableOnly);
  render();
}

function fmt(n) {
  return n ? '$' + n.toLocaleString() : null;
}

function render() {
  const container = document.getElementById('floors-container');
  container.innerHTML = '';

  const floorLabels = { '1': 'Floor 1', '2': 'Floor 2', '3': 'Floor 3', '4': 'Floor 4', 'Lot': 'Outdoor / Lot' };

  for (const [floorKey, units] of Object.entries(pricingData.floors)) {
    if (currentFloor !== 'all' && currentFloor !== floorKey) continue;

    let filtered = availableOnly ? units.filter(u => u.status === 'Available') : units;
    if (filtered.length === 0) continue;

    const section = document.createElement('div');
    section.className = 'floor-section';
    section.dataset.floor = floorKey;
    section.innerHTML = '<div class="floor-label">' + (floorLabels[floorKey] || 'Floor ' + floorKey) + '</div>';

    const grid = document.createElement('div');
    grid.className = 'units-grid';

    filtered.forEach(unit => {
      const isAvail = unit.status === 'Available';
      const card = document.createElement('div');
      card.className = 'unit-card' + (isAvail ? '' : ' not-available');
      const price = unit.total_monthly ?
        '<div class="unit-price">' + fmt(unit.total_monthly) + '<span> / mo</span></div>' :
        '<div class="unit-price-na">Pricing on request</div>';

      card.innerHTML =
        '<div class="unit-name">' + unit.unit + '</div>' +
        '<span class="unit-badge ' + (isAvail ? 'badge-available' : 'badge-unavailable') + '">' + unit.status + '</span>' +
        '<div class="unit-details">' +
        (unit.sq_ft ? '<div>&#128208; ' + unit.sq_ft.toLocaleString() + ' sq ft</div>' : '') +
        (unit.per_sq_ft ? '<div>&#128178; $' + unit.per_sq_ft + '/sq ft/yr</div>' : '') +
        (unit.fobs > 0 ? '<div>&#128273; ' + unit.fobs + ' FOB(s) included</div>' : '') +
        (unit.mailbox > 0 ? '<div>&#128140; Mailbox included</div>' : '') +
        (unit.desks > 0 ? '<div>&#128187; ' + unit.desks + ' desk(s) included</div>' : '') +
        '</div>' + price;

      grid.appendChild(card);
    });

    section.appendChild(grid);
    container.appendChild(section);
  }

  const addonsContainer = document.getElementById('addons-container');
  addonsContainer.innerHTML = '';
  pricingData.addons.forEach(a => {
    addonsContainer.innerHTML +=
      '<div class="addon-row"><span class="addon-name">' + a.name + '</span><span class="addon-price">$' + a.monthly + '/mo</span></div>';
  });

  document.getElementById('last-updated').textContent = 'Last updated: ' + pricingData.last_updated;
  window.parent.postMessage({ type: 'bakery-height', height: document.body.scrollHeight }, '*');
}

loadData();
</script>
</body>
</html>
