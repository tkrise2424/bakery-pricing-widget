<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Biz Hub – Pricing & Availability</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Roboto',sans-serif;background:#f4f4f4;color:#0D0D0D;padding:24px 16px 48px}

.header{text-align:center;margin-bottom:28px}
.header h1{font-family:Arial,sans-serif;font-size:2rem;font-weight:700;color:#AF2849}
.header p{font-size:.95rem;color:#686E6E;margin-top:6px}

.filter-bar{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:28px}
.btn{font-family:Arial,sans-serif;font-size:.85rem;font-weight:700;padding:8px 22px;
  border-radius:999px;border:2px solid #AF2849;background:transparent;color:#AF2849;
  cursor:pointer;transition:all .2s}
.btn:hover,.btn.active{background:#AF2849;color:#fff}

.floor-section{margin-bottom:36px}
.floor-label{font-family:Arial,sans-serif;font-size:1rem;font-weight:700;color:#fff;
  background:#0D0D0D;padding:7px 18px;border-radius:6px;display:inline-block;margin-bottom:14px}

.units-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}

.unit-card{background:#fff;border-radius:10px;padding:18px 20px;
  border:1.5px solid #e0e0e0;position:relative;overflow:hidden;
  transition:transform .15s,box-shadow .15s}
.unit-card:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,0,0,.09)}
.unit-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:#AF2849}
.unit-card.na::before{background:#686E6E}

.card-name{font-family:Arial,sans-serif;font-size:1rem;font-weight:700;margin-bottom:8px}
.card-badge{display:inline-block;font-size:.72rem;font-weight:700;padding:3px 10px;
  border-radius:999px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:14px}
.badge-avail{background:#e8f5e9;color:#2e7d32}
.badge-unavail{background:#f0f0f0;color:#686E6E}

.card-price{font-family:Arial,sans-serif;font-size:1.4rem;font-weight:700;color:#AF2849}
.card-price small{font-size:.8rem;font-weight:400;color:#686E6E}
.card-price-na{font-size:.88rem;color:#686E6E;font-style:italic}

.last-updated{text-align:center;font-size:.75rem;color:#bbb;margin-top:28px}

@media(max-width:500px){
  .header h1{font-size:1.5rem}
  .units-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div class="header">
  <h1>Pricing &amp; Availability</h1>
  <p>901 S 15th St. &mdash; Biz Hub</p>
</div>

<div class="filter-bar">
  <button class="btn active" onclick="filterFloor('all',this)">All Floors</button>
  <button class="btn" onclick="filterFloor('1',this)">Floor 1</button>
  <button class="btn" onclick="filterFloor('2',this)">Floor 2</button>
  <button class="btn" onclick="filterFloor('3',this)">Floor 3</button>
  <button class="btn" onclick="filterFloor('4',this)">Floor 4</button>
  <button class="btn" onclick="filterFloor('Lot',this)">Lot</button>
  <button class="btn" id="avail-btn" onclick="filterAvailable(this)">Available Only</button>
</div>

<div id="floors-container"></div>
<div class="last-updated" id="last-updated"></div>

<script>
let pricingData = null;
let currentFloor = 'all';
let availOnly = false;

const FLOOR_LABELS = {'1':'Floor 1','2':'Floor 2','3':'Floor 3','4':'Floor 4','Lot':'Outdoor / Lot'};

async function init() {
  const res = await fetch('pricing.json?v=' + Date.now());
  pricingData = await res.json();
  render();
}

function filterFloor(floor, btn) {
  currentFloor = floor;
  availOnly = false;
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function filterAvailable(btn) {
  availOnly = !availOnly;
  currentFloor = 'all';
  document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
  if (availOnly) btn.classList.add('active');
  render();
}

function render() {
  const container = document.getElementById('floors-container');
  container.innerHTML = '';

  for (const [floorKey, units] of Object.entries(pricingData.floors)) {
    if (currentFloor !== 'all' && currentFloor !== floorKey) continue;
    let filtered = availOnly ? units.filter(u => u.status === 'Available') : units;
    if (!filtered.length) continue;

    const section = document.createElement('div');
    section.className = 'floor-section';

    const label = document.createElement('div');
    label.className = 'floor-label';
    label.textContent = FLOOR_LABELS[floorKey] || 'Floor ' + floorKey;
    section.appendChild(label);

    const grid = document.createElement('div');
    grid.className = 'units-grid';

    filtered.forEach(u => {
      const isAvail = u.status === 'Available';
      const card = document.createElement('div');
      card.className = 'unit-card' + (isAvail ? '' : ' na');
      card.innerHTML =
        '<div class="card-name">' + u.unit + '</div>' +
        '<span class="card-badge ' + (isAvail ? 'badge-avail' : 'badge-unavail') + '">' + u.status + '</span><br/>' +
        (u.total_monthly
          ? '<div class="card-price">$' + u.total_monthly.toLocaleString() + '<small> / mo</small></div>'
          : '<div class="card-price-na">Pricing on request</div>');
      grid.appendChild(card);
    });

    section.appendChild(grid);
    container.appendChild(section);
  }

  document.getElementById('last-updated').textContent = 'Last updated: ' + pricingData.last_updated;
  window.parent.postMessage({type:'bakery-height', height: document.body.scrollHeight}, '*');
}

init();
</script>
</body>
</html>
